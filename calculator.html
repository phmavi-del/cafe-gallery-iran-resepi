<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ماشین حساب</title>

<style>
body{
font-family:tahoma;
background:#111;
color:#fff;
text-align:center;
padding:20px;
}

h1{
color:#d4af37;
margin-bottom:20px;
}

input{
width:100%;
max-width:400px;
padding:15px;
font-size:24px;
background:#222;
color:#fff;
border:1px solid #d4af37;
border-radius:8px;
text-align:left;
direction:ltr;
}

.grid{
display:grid;
grid-template-columns:repeat(4,80px);
gap:10px;
justify-content:center;
margin-top:20px;
}

button{
padding:15px;
font-size:20px;
background:#d4af37;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

button:hover{
opacity:.9;
}
</style>

</head>
<body>

<h1>🧮 ماشین حساب کافه گالری ایران</h1>

<input id="display" readonly>

<div class="grid">

<button onclick="add('7')">7</button>
<button onclick="add('8')">8</button>
<button onclick="add('9')">9</button>
<button onclick="add('/')">÷</button>

<button onclick="add('4')">4</button>
<button onclick="add('5')">5</button>
<button onclick="add('6')">6</button>
<button onclick="add('*')">×</button>

<button onclick="add('1')">1</button>
<button onclick="add('2')">2</button>
<button onclick="add('3')">3</button>
<button onclick="add('-')">−</button>

<button onclick="add('0')">0</button>
<button onclick="add('.')">.</button>
<button onclick="calc()">=</button>
<button onclick="add('+')">+</button>

<button onclick="clr()" style="grid-column:span 4">
پاک کردن
</button>

</div>

<script>

function add(v){

document.getElementById("display").value += v;

}

function clr(){

document.getElementById("display").value = "";

}

function calc(){

try{

document.getElementById("display").value =
eval(
document.getElementById("display").value
);

}catch(e){

document.getElementById("display").value =
"Error";

}

}

</script>

</body>
</html>
