<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>پشتیبان گیری</title>

<style>
body{
font-family:tahoma;
background:#111;
color:#fff;
padding:20px;
}

h1{
color:#d4af37;
}

button{
padding:12px 16px;
margin:5px;
background:#d4af37;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

input{
margin-top:10px;
width:100%;
}

.card{
background:#1b1b1b;
border:1px solid #d4af37;
padding:15px;
border-radius:10px;
margin-top:15px;
}
</style>

</head>
<body>

<h1>💾 پشتیبان گیری و بازیابی</h1>

<div class="card">

<button onclick="backup()">
دریافت فایل پشتیبان
</button>

</div>

<div class="card">

<input type="file" id="restoreFile">

<button onclick="restore()">
بازیابی اطلاعات
</button>

</div>

<script>

function backup(){

const data = {

recipes:
JSON.parse(localStorage.getItem("recipes") || "[]"),

inventory:
JSON.parse(localStorage.getItem("inventory") || "[]"),

notes:
JSON.parse(localStorage.getItem("notes") || "[]"),

contacts:
JSON.parse(localStorage.getItem("contacts") || "[]"),

cafeName:
localStorage.getItem("cafeName") || "",

theme:
localStorage.getItem("theme") || "gold",

password:
localStorage.getItem("password") || "1234"

};

const blob = new Blob(
[JSON.stringify(data,null,2)],
{type:"application/json"}
);

const a = document.createElement("a");

a.href = URL.createObjectURL(blob);

a.download = "CafeGalleryIran_Backup.json";

a.click();

}

function restore(){

const file =
document.getElementById("restoreFile").files[0];

if(!file){
alert("فایل انتخاب نشده");
return;
}

const reader = new FileReader();

reader.onload = function(e){

try{

const data =
JSON.parse(e.target.result);

localStorage.setItem(
"recipes",
JSON.stringify(data.recipes || [])
);

localStorage.setItem(
"inventory",
JSON.stringify(data.inventory || [])
);

localStorage.setItem(
"notes",
JSON.stringify(data.notes || [])
);

localStorage.setItem(
"contacts",
JSON.stringify(data.contacts || [])
);

localStorage.setItem(
"cafeName",
data.cafeName || "کافه گالری ایران"
);

localStorage.setItem(
"theme",
data.theme || "gold"
);

localStorage.setItem(
"password",
data.password || "1234"
);

alert("بازیابی با موفقیت انجام شد");

location.reload();

}catch(err){

alert("فایل پشتیبان معتبر نیست");

}

};

reader.readAsText(file);

}

</script>

</body>
</html>
